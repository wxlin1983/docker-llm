# Egress proxy for the sandbox container. The sandbox sits on an internal-only
# Docker network with no route out; every outbound connection must pass through
# this proxy, which only permits CONNECT/GET to domains in allowlist.txt.
# Audit trail: docker compose exec proxy tail -f /var/log/squid/access.log
# (squid drops root after startup, so it can't keep the container's stdout pipe)

http_port 3128

# --- destination ACLs -------------------------------------------------------

acl allowed_dst dstdomain "/etc/squid/allowlist.txt"

# Private / link-local / loopback / CGNAT ranges: the proxy must never be a
# pivot into the host LAN, other containers, or cloud metadata endpoints.
acl to_private dst 10.0.0.0/8
acl to_private dst 172.16.0.0/12
acl to_private dst 192.168.0.0/16
acl to_private dst 169.254.0.0/16
acl to_private dst 127.0.0.0/8
acl to_private dst 100.64.0.0/10

acl Safe_ports port 80 443
acl SSL_ports port 443
acl CONNECT method CONNECT

# --- access policy (order matters: first match wins) ------------------------

http_access deny to_private
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports
http_access allow allowed_dst
http_access deny all

# --- behavior ---------------------------------------------------------------

# Pure gatekeeper: no caching (no cache_dir configured -> nothing on disk).
cache deny all
access_log stdio:/var/log/squid/access.log squid
cache_log /var/log/squid/cache.log

# Don't advertise internal hostnames in error pages.
httpd_suppress_version_string on
visible_hostname sandbox-egress

# No ICMP measurement helper (would need raw sockets the container doesn't have).
pinger_enable off
